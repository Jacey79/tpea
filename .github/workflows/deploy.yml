# Static deploy to GitHub Pages.
#
# This workflow is OPTIONAL. The recommended setup for this repo is plain
# branch publishing (Settings → Pages → Source: "Deploy from a branch" →
# main / root). That alone is enough — no workflow needed.
#
# Use this workflow instead if you've set Settings → Pages → Source to
# "GitHub Actions". The two are mutually exclusive: pick one.
#
# What this does:
#   1. On every push to `main` (or manual trigger), zips up the whole
#      working tree and uploads it as a GitHub Pages artifact.
#   2. Deploys the artifact to the github-pages environment.
#
# There's no build step — we ship the repo as-is, since TPEA is plain
# static HTML/CSS/JS + CSV.

name: Deploy TPEA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid clobbering an in-progress deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo, since the entry file (index.html) is at the root.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
